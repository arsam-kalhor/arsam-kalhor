name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: arsam-kalhor
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00BFFF&color_dots=#EBEDF0,#BDF6FF,#75ECFF,#00BFFF,#00A8CC
            dist/github-contribution-grid-snake-dark.svg?color_snake=#00F7FF&color_dots=#161B22,#063A47,#087B8C,#00BFFF,#00F7FF

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
