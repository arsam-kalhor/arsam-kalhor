name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: arsam-kalhor
          outputs: |
            dist/snake-cyan-purple.svg?color_snake=#00BFFF&color_dots=#EBEDF0,#C4B5FD,#A78BFA,#7C3AED,#00BFFF
            dist/snake-cyan-purple-dark.svg?color_snake=#00F7FF&color_dots=#161B22,#1F2A44,#3B3F8C,#7C3AED,#A855F7

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
